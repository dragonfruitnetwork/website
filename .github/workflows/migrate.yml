name: Apply Prisma migrations

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (tag name)'
        required: true
        type: string

      mode:
        description: 'Mode'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - deploy

concurrency:
  group: prisma-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Migration (${{ github.event.inputs.mode }})
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get pre-migration status
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "## Pre-migration status" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx prisma migrate status 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Preview migrations
        if: github.event.inputs.mode == 'preview'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "## Pending SQL (preview only, no writes)" >> "$GITHUB_STEP_SUMMARY"
          echo '```sql' >> "$GITHUB_STEP_SUMMARY"
          set +e
          npx prisma migrate diff \
            --from-config-datasource \
            --to-migrations prisma/migrations \
            --script \
            --exit-code 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          rc=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            exit "$rc"
          fi

      - name: Deploy migrations
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'deploy'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "## Applied migrations" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx prisma migrate deploy 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Get post-migration status
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'deploy'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "## Post-migration status" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx prisma migrate status 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
